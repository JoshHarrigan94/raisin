<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Raisin Best Friends</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- APP -->

  <div id="app">

    <!-- TOP BAR -->

    <div id="topBar">

      <div class="glassCard">

        <h1>Raisin Best Friends</h1>

        <p>
          Pet her, give treats,
          play gently, and build your bond.
        </p>

      </div>

      <div class="glassCard statusCard">

        <span class="smallLabel">
          Getting to know you
        </span>

        <div class="bondBar">

          <div id="bondFill"></div>

        </div>

        <h2 id="moodText">
          Curious
        </h2>

      </div>

    </div>

    <!-- WORLD -->

    <div id="world">

      <canvas id="raisinCanvas"></canvas>

    </div>

    <!-- DIALOGUE -->

    <div id="dialogueBubble">

      Quiet companionship mode.

    </div>

    <!-- CONTROLS -->

    <div id="controls">

      <button class="actionButton" id="treatBtn">
        🦴
        <span>Treat</span>
      </button>

      <button class="actionButton" id="toyBtn">
        🎾
        <span>Toy</span>
      </button>

      <button class="actionButton" id="callBtn">
        💬
        <span>Call</span>
      </button>

      <button class="actionButton" id="napBtn">
        🌙
        <span>Nap</span>
      </button>

      <button class="actionButton" id="photoBtn">
        📸
        <span>Photo</span>
      </button>

      <button class="actionButton" id="resetBtn">
        ↺
        <span>Reset</span>
      </button>

    </div>

  </div>

  <!-- JS -->

  <script src="raisin-storybook.js"></script>

</body>

</html>
