<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Raisin Best Friends</title>

  <style>
    :root {
      --bg: #120d0b;
      --panel: rgba(255, 248, 235, 0.12);
      --panel-strong: rgba(255, 248, 235, 0.2);
      --text: #fff4df;
      --muted: #d6bfa2;
      --accent: #d9965b;
      --accent-2: #8f5b37;
      --good: #ffd88a;
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  height: 100dvh;
  overflow: hidden;
  overscroll-behavior: none;
  background: radial-gradient(circle at top, #2b1b14 0%, #120d0b 55%, #070504 100%);
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  user-select: none;
  -webkit-user-select: none;
}

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .top-card {
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .brand {
      max-width: 260px;
      padding: 14px 16px;
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(255,255,255,0.15), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 18px 50px var(--shadow);
      backdrop-filter: blur(16px);
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .mood-card {
      width: 158px;
      padding: 14px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 50px var(--shadow);
    }

    .mood-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .meter {
      height: 8px;
      width: 100%;
      border-radius: 99px;
      background: rgba(255,255,255,0.14);
      overflow: hidden;
      margin-bottom: 9px;
    }

    .meter span {
      display: block;
      height: 100%;
      width: 65%;
      border-radius: inherit;
      background: linear-gradient(90deg, #d9965b, #ffd88a);
    }

    .status-text {
      font-size: 13px;
      font-weight: 700;
    }

    .bottom-controls {
  position: absolute;
  left: 50%;
  bottom: max(18px, env(safe-area-inset-bottom));
  transform: translateX(-50%);
  display: grid;
  grid-template-columns: repeat(3, 70px);
  gap: 10px;
  pointer-events: auto;
}

    .control-btn {
      height: 68px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.07));
      color: var(--text);
      box-shadow: 0 16px 40px rgba(0,0,0,0.3);
      backdrop-filter: blur(14px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }

    .control-btn span {
      font-size: 22px;
      margin-bottom: 3px;
    }

    .control-btn small {
      font-size: 10px;
      color: var(--muted);
    }

    .control-btn:active {
  transform: translateY(3px) scale(0.96);
  background: rgba(255, 216, 138, 0.18);
  border-color: rgba(255, 216, 138, 0.34);
}

   .hint {
  position: absolute;
  left: 50%;
  bottom: calc(max(18px, env(safe-area-inset-bottom)) + 148px);
  transform: translateX(-50%);
  padding: 10px 14px;
  max-width: calc(100vw - 28px);
  border-radius: 999px;
  background: rgba(0,0,0,0.28);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--muted);
  font-size: 12px;
  backdrop-filter: blur(12px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

    .debug {
      position: absolute;
      right: 18px;
      top: 132px;
      width: 180px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.72);
      font-size: 11px;
      line-height: 1.5;
      backdrop-filter: blur(12px);
      display: none;
    }
    
    .loading-screen {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: grid;
  place-items: center;
  background: radial-gradient(circle at top, #2b1b14 0%, #120d0b 60%, #070504 100%);
  transition: opacity 500ms ease, visibility 500ms ease;
}

.loading-screen.hidden {
  opacity: 0;
  visibility: hidden;
}

.loading-card {
  width: min(320px, calc(100vw - 36px));
  padding: 26px 22px;
  border-radius: 28px;
  text-align: center;
  background: rgba(255, 248, 235, 0.12);
  border: 1px solid rgba(255,255,255,0.16);
  box-shadow: 0 24px 70px rgba(0,0,0,0.45);
  backdrop-filter: blur(18px);
}

.loading-paw {
  font-size: 34px;
  margin-bottom: 10px;
}

.loading-card h2 {
  margin: 0;
  font-size: 22px;
  letter-spacing: -0.04em;
}

.loading-card p {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 13px;
}

.hud.hidden-for-photo {
  opacity: 0;
  pointer-events: none;
}

.hud {
  transition: opacity 220ms ease;
}

    @media (max-width: 640px) {
  .top-card {
    top: max(10px, env(safe-area-inset-top));
    left: 10px;
    right: 10px;
    gap: 8px;
  }

  .brand {
    max-width: 188px;
    padding: 11px 12px;
    border-radius: 18px;
  }

  .brand h1 {
    font-size: 15px;
  }

  .brand p {
    font-size: 11px;
  }

  .mood-card {
    width: 132px;
    padding: 11px;
    border-radius: 18px;
  }

  .mood-title {
    font-size: 11px;
  }

  .status-text {
    font-size: 12px;
  }

  .bottom-controls {
    grid-template-columns: repeat(3, 62px);
    gap: 8px;
  }

  .control-btn {
    width: 64px;
    height: 60px;
    border-radius: 19px;
  }

  .control-btn span {
    font-size: 21px;
  }

  .control-btn small {
    font-size: 9px;
  }

  .debug {
    display: none;
  }
}

@media (max-width: 390px) {
  .brand p {
    display: none;
  }

  .bottom-controls {
    grid-template-columns: repeat(3, 56px);
    gap: 7px;
  }

  .control-btn {

  width: 49px;

  height: 52px;
  }

  .hint {
    font-size: 11px;
  }
}
  </style>
</head>

<body>
  <div id="app"></div>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-card">
    <div class="loading-paw">🐾</div>
    <h2>Finding Raisin...</h2>
    <p>Preparing the cosy room.</p>
  </div>
</div>

  <div class="hud">
    <div class="top-card">
      <div class="brand">
        <h1>Raisin Best Friends</h1>
        <p>Pet her, give treats, play gently, and build your bond.</p>
      </div>

      <div class="mood-card">
        <div class="mood-title">Bond with Raisin</div>
        <div class="meter"><span id="bondMeter"></span></div>
        <div class="status-text" id="statusText">Curious</div>
      </div>
    </div>

    <div class="debug" id="debugPanel"></div>

    <div class="hint" id="hintText">Drag over Raisin to pet her</div>

    <div class="bottom-controls">
      <button class="control-btn" id="treatBtn"><span>🦴</span><small>Treat</small></button>
      <button class="control-btn" id="toyBtn"><span>🎾</span><small>Toy</small></button>
      <button class="control-btn" id="callBtn"><span>💬</span><small>Call</small></button>
      <button class="control-btn" id="napBtn"><span>🌙</span><small>Nap</small></button>
<button class="control-btn" id="photoBtn"><span>📸</span><small>Photo</small></button>
<button class="control-btn" id="resetBtn"><span>↺</span><small>Reset</small></button>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.167.1";
    import { OrbitControls } from "https://esm.sh/three@0.167.1/examples/jsm/controls/OrbitControls.js";

    /************************************************************
     * 01. CONFIG
     ************************************************************/

    const CONFIG = {
      scene: {
        backgroundTop: 0x2b1b14,
        backgroundBottom: 0x070504,
        fogColor: 0x120d0b,
        fogNear: 6,
        fogFar: 18
      },

      raisin: {
        name: "Raisin",
        coatDark: 0x2a1510,
        coatMid: 0x4b261a,
        tan: 0xc7834d,
        amberEye: 0xd89442,
        nose: 0x11100f,
        chest: 0x6a3824
      },

      interaction: {
        petDistance: 1.1,
        affectionGain: 0.18,
        treatGain: 8,
        toyGain: 6,
        callGain: 3
      }
    };

    /************************************************************
     * 02. RAISIN PROFILE
     ************************************************************/

    const RaisinProfile = {
      identity: {
        breed: "Cocker Spaniel",
        personality: ["curious", "soft", "playful", "expressive", "food motivated"],
        signatureFeatures: [
          "large amber eyes",
          "tan eyebrows",
          "deep chocolate coat",
          "long feathered ears",
          "soft muzzle",
          "gentle human-like expression"
        ]
      },

      reactions: {
        petHead: ["eyes-soft", "tail-wag", "lean-forward"],
        treat: ["alert", "sit", "happy-mouth"],
        toy: ["play-bow", "ears-bounce", "tail-fast"],
        call: ["head-tilt", "eye-contact"],
        nap: ["sleepy-blink", "settle"]
      }
    };

    /************************************************************
     * 03. APP STATE
     ************************************************************/

    const State = {
  bond: 35,
  affection: 45,
  energy: 62,
  hunger: 40,
  playfulness: 54,
  comfort: 48,
  trust: 38,

  mood: "Curious",
  bondStage: "Getting to know you",
  currentAction: "idle",

  isPointerDown: false,
  pointer: new THREE.Vector2(),
  pointerWorld: new THREE.Vector3(),
  lastPetTime: 0,

  sessionSeconds: 0,
  lastMoodUpdate: 0,
  debug: false
};

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function setMood(mood) {
      State.mood = mood;
      document.getElementById("statusText").textContent = mood;
    }

    function addBond(amount) {
  State.bond = clamp(State.bond + amount, 0, 100);
  State.trust = clamp(State.trust + amount * 0.22, 0, 100);

  document.getElementById("bondMeter").style.width = `${State.bond}%`;

  const title = document.querySelector(".mood-title");
  if (title) title.textContent = MoodEngine.describeBond();
}

    function setHint(text) {
      document.getElementById("hintText").textContent = text;
    }

/************************************************************
 * 03B. MOOD AND BOND ENGINE
 ************************************************************/

const MoodEngine = {
  bondStages: [
    { min: 0, label: "Getting to know you" },
    { min: 25, label: "New friend" },
    { min: 50, label: "Trusted human" },
    { min: 75, label: "Best friends" },
    { min: 92, label: "Soul dog bond" }
  ],

  idleMoods: [
    "Curious",
    "Content",
    "Watching You",
    "Soft Eyes",
    "Waiting",
    "Settled"
  ],

  actionLockMoods: new Set([
    "Happy",
    "Melting",
    "Best Friends",
    "Treat Locked",
    "Very Interested",
    "Satisfied",
    "Play Bow",
    "Playful",
    "Listening",
    "Sleepy"
  ]),

  update(delta, time) {
    State.sessionSeconds += delta;

    this.decayNeeds(delta);
    this.updateBondStage();
    this.updateAutomaticMood(time);
    this.updateHudTone();
  },

  decayNeeds(delta) {
    State.affection = clamp(State.affection - delta * 0.28, 0, 100);
    State.energy = clamp(State.energy - delta * 0.08, 0, 100);
    State.hunger = clamp(State.hunger + delta * 0.12, 0, 100);
    State.playfulness = clamp(State.playfulness - delta * 0.06, 0, 100);

    if (State.currentAction === "pet") {
      State.comfort = clamp(State.comfort + delta * 2.2, 0, 100);
      State.trust = clamp(State.trust + delta * 0.9, 0, 100);
    }

    if (State.currentAction === "playToy") {
      State.playfulness = clamp(State.playfulness + delta * 2.4, 0, 100);
      State.energy = clamp(State.energy - delta * 1.2, 0, 100);
    }

    if (State.currentAction === "nap") {
      State.energy = clamp(State.energy + delta * 3.2, 0, 100);
      State.comfort = clamp(State.comfort + delta * 1.4, 0, 100);
    }
  },

  updateBondStage() {
    let stage = this.bondStages[0].label;

    for (const item of this.bondStages) {
      if (State.bond >= item.min) stage = item.label;
    }

    State.bondStage = stage;
  },

  updateAutomaticMood(time) {
    if (State.currentAction !== "idle") return;

    if (time - State.lastMoodUpdate < 4.5) return;
    State.lastMoodUpdate = time;

    if (State.hunger > 78) {
      setMood("Snack Thinking");
      setHint("Raisin may be wondering about treats.");
      return;
    }

    if (State.energy < 22) {
      setMood("Dozy");
      setHint("She is getting sleepy.");
      return;
    }

    if (State.affection < 22) {
      setMood("Waiting");
      setHint("She could use a little fuss.");
      return;
    }

    if (State.bond > 75 && Math.random() < 0.45) {
      setMood("Soft Eyes");
      setHint("She is quietly happy you are here.");
      return;
    }

    const mood = this.idleMoods[Math.floor(Math.random() * this.idleMoods.length)];
    setMood(mood);

    const hints = {
      Curious: "She is watching your hand.",
      Content: "She feels settled.",
      "Watching You": "Raisin is keeping an eye on you.",
      "Soft Eyes": "That little look means trust.",
      Waiting: "She is waiting for attention.",
      Settled: "Quiet companionship mode."
    };

    setHint(hints[mood] || "Drag over Raisin to pet her.");
  },

  updateHudTone() {
    const brand = document.querySelector(".brand");
    const card = document.querySelector(".mood-card");

    if (!brand || !card) return;

    if (State.bond >= 75) {
      brand.style.borderColor = "rgba(255, 216, 138, 0.32)";
      card.style.borderColor = "rgba(255, 216, 138, 0.36)";
    } else if (State.bond >= 50) {
      brand.style.borderColor = "rgba(217, 150, 91, 0.28)";
      card.style.borderColor = "rgba(217, 150, 91, 0.28)";
    } else {
      brand.style.borderColor = "rgba(255,255,255,0.16)";
      card.style.borderColor = "rgba(255,255,255,0.14)";
    }
  },

  describeBond() {
    if (State.bond >= 92) return "Soul dog bond";
    if (State.bond >= 75) return "Best friends";
    if (State.bond >= 50) return "Trusted human";
    if (State.bond >= 25) return "New friend";
    return "Getting to know you";
  }
};

    /************************************************************
     * 04. THREE CORE
     ************************************************************/

    const app = document.getElementById("app");

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(CONFIG.scene.fogColor, CONFIG.scene.fogNear, CONFIG.scene.fogFar);

    const camera = new THREE.PerspectiveCamera(
      42,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2.3, 6.2);

    const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: false,
  powerPreference: "high-performance",
  preserveDrawingBuffer: true
});

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.24;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.05, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.enablePan = false;
    controls.minDistance = 3.4;
    controls.maxDistance = 8;
    controls.maxPolarAngle = Math.PI * 0.48;

    /************************************************************
     * 05. MATERIALS
     ************************************************************/

    const Materials = {
  coatDark: new THREE.MeshStandardMaterial({
    color: CONFIG.raisin.coatDark,
    roughness: 0.82,
    metalness: 0.01
  }),

  coatMid: new THREE.MeshStandardMaterial({
    color: CONFIG.raisin.coatMid,
    roughness: 0.78,
    metalness: 0.01
  }),

  tan: new THREE.MeshStandardMaterial({
    color: CONFIG.raisin.tan,
    roughness: 0.74,
    metalness: 0.01
  }),

  furHalo: new THREE.MeshBasicMaterial({
    color: 0x7a3f26,
    transparent: true,
    opacity: 0.16,
    depthWrite: false
  }),

  eye: new THREE.MeshPhysicalMaterial({
    color: CONFIG.raisin.amberEye,
    roughness: 0.05,
    metalness: 0,
    transmission: 0.05,
    clearcoat: 1,
    clearcoatRoughness: 0.02,
    reflectivity: 1
  }),

  pupil: new THREE.MeshBasicMaterial({
    color: 0x070403
  }),

  nose: new THREE.MeshPhysicalMaterial({
    color: CONFIG.raisin.nose,
    roughness: 0.14,
    metalness: 0,
    clearcoat: 1,
    clearcoatRoughness: 0.05
  }),

  roomFloor: new THREE.MeshStandardMaterial({
    color: 0x51311f,
    roughness: 0.88
  }),

  rug: new THREE.MeshStandardMaterial({
    color: 0x9a6040,
    roughness: 0.92
  }),

  toy: new THREE.MeshStandardMaterial({
    color: 0xf0bd4f,
    roughness: 0.48
  }),

  treat: new THREE.MeshStandardMaterial({
    color: 0xb87835,
    roughness: 0.6
  }),

  chest: new THREE.MeshStandardMaterial({
    color: 0x704029,
    roughness: 0.82,
    metalness: 0.01
  })
};

    /************************************************************
     * 06. LIGHTING
     ************************************************************/

    function createLighting() {
  const ambient = new THREE.HemisphereLight(0xffe6c7, 0x170b06, 1.55);
  scene.add(ambient);

  const key = new THREE.DirectionalLight(0xffc08a, 3.8);
  key.position.set(4.5, 6.5, 5.5);
  key.castShadow = true;
  key.shadow.mapSize.width = 2048;
  key.shadow.mapSize.height = 2048;
  key.shadow.camera.near = 0.5;
  key.shadow.camera.far = 20;
  key.shadow.camera.left = -6;
  key.shadow.camera.right = 6;
  key.shadow.camera.top = 6;
  key.shadow.camera.bottom = -6;
  scene.add(key);

  const softFill = new THREE.PointLight(0xffd6aa, 1.5, 7);
  softFill.position.set(-2.6, 2.2, 3.4);
  scene.add(softFill);

  const rim = new THREE.PointLight(0x9bbcff, 1.4, 8);
  rim.position.set(-3.4, 2.7, -3.2);
  scene.add(rim);

  const lamp = new THREE.PointLight(0xffa45e, 3.4, 7.5);
  lamp.position.set(2.6, 1.5, 1.8);
  scene.add(lamp);
}

    createLighting();

    /************************************************************
     * 07. ENVIRONMENT
     ************************************************************/

    function createEnvironment() {
      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(18, 18),
        Materials.roomFloor
      );
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      scene.add(floor);

      const rug = new THREE.Mesh(
        new THREE.CircleGeometry(2.35, 80),
        Materials.rug
      );
      rug.rotation.x = -Math.PI / 2;
      rug.position.y = 0.012;
      rug.receiveShadow = true;
      scene.add(rug);

      const backWall = new THREE.Mesh(
        new THREE.PlaneGeometry(18, 8),
        new THREE.MeshStandardMaterial({
          color: 0x24130d,
          roughness: 0.9
        })
      );
      backWall.position.set(0, 4, -5);
      backWall.receiveShadow = true;
      scene.add(backWall);

      const lampStand = new THREE.Mesh(
        new THREE.CylinderGeometry(0.035, 0.035, 1.4, 16),
        new THREE.MeshStandardMaterial({ color: 0x2a1a12, roughness: 0.5 })
      );
      lampStand.position.set(2.7, 0.7, 1.8);
      scene.add(lampStand);

      const lampShade = new THREE.Mesh(
        new THREE.ConeGeometry(0.35, 0.45, 32, 1, true),
        new THREE.MeshStandardMaterial({
          color: 0xe0a36b,
          roughness: 0.7,
          emissive: 0x5a2c12,
          emissiveIntensity: 0.35
        })
      );
      lampShade.position.set(2.7, 1.5, 1.8);
      scene.add(lampShade);
    }

    createEnvironment();

    /************************************************************
 * 08. PROCEDURAL RAISIN MODEL
 ************************************************************/

const Raisin = {
  root: new THREE.Group(),
  body: null,
  ribcage: null,
  haunches: null,
  neck: null,
  head: null,
  crown: null,
  muzzle: null,
  nose: null,
  leftEye: null,
  rightEye: null,
  leftPupil: null,
  rightPupil: null,
  leftEyeShine: null,
  rightEyeShine: null,
  leftEar: null,
  rightEar: null,
  tail: null,
  chest: null,
  parts: [],
  gestureZones: []
};

function makeSphere(name, sx, sy, sz, material, position, segments = 48) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(1, segments, Math.max(20, segments / 1.5)),
    material
  );
  mesh.name = name;
  mesh.scale.set(sx, sy, sz);
  mesh.position.copy(position);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

function makeCapsule(name, radius, length, material, position, rotation = new THREE.Euler()) {
  const mesh = new THREE.Mesh(
    new THREE.CapsuleGeometry(radius, length, 12, 24),
    material
  );
  mesh.name = name;
  mesh.position.copy(position);
  mesh.rotation.copy(rotation);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

function makeFeatherTuft(name, material, position, scale, rotationZ = 0) {
  const tuft = new THREE.Mesh(
    new THREE.ConeGeometry(0.16, 0.48, 18),
    material
  );
  tuft.name = name;
  tuft.position.copy(position);
  tuft.scale.copy(scale);
  tuft.rotation.z = rotationZ;
  tuft.rotation.x = Math.PI;
  tuft.castShadow = true;
  tuft.receiveShadow = true;
  return tuft;
}

function addFurHalo(targetMesh, scaleBoost = 1.035) {
  const halo = targetMesh.clone();

  halo.castShadow = false;
  halo.receiveShadow = false;
  targetMesh.add(halo);
  return halo;
}

const ToySystem = {
  ball: null,
  treat: null,
  activeToy: false,
  toyExcitement: 0,
  treatActive: false,
  treatTimer: 0,
  ballTarget: new THREE.Vector3(-1.35, 0.2, 1.2),

  create() {
    this.ball = new THREE.Mesh(
      new THREE.SphereGeometry(0.16, 32, 20),
      Materials.toy
    );
    this.ball.position.set(-1.35, 0.2, 1.2);
    this.ball.castShadow = true;
    scene.add(this.ball);

    this.treat = new THREE.Mesh(
      new THREE.BoxGeometry(0.18, 0.08, 0.12),
      Materials.treat
    );
    this.treat.position.set(1.35, 0.15, 1.2);
    this.treat.rotation.y = 0.4;
    this.treat.castShadow = true;
    scene.add(this.treat);
  },

  giveTreat() {
    this.treatActive = true;
    this.treatTimer = 2.8;

    this.treat.visible = true;
    this.treat.scale.set(1, 1, 1);
    this.treat.position.set(1.25, 0.24, 1.25);
    this.treat.rotation.set(0.2, 0.6, -0.15);

    State.currentAction = "anticipateTreat";
    State.hunger = clamp(State.hunger - 18, 0, 100);
State.affection = clamp(State.affection + 5, 0, 100);
State.trust = clamp(State.trust + 2.5, 0, 100);

    setMood("Treat Locked");
    setHint("She has spotted the treat.");
    addBond(CONFIG.interaction.treatGain);
  },

  tossToy() {
    this.activeToy = true;
    this.toyExcitement = 1;

    this.ball.visible = true;
    this.ball.position.set(-1.35, 0.22, 1.2);
    this.ballTarget.set(
      -0.9 + Math.random() * 1.8,
      0.22,
      0.75 + Math.random() * 0.7
    );

    State.currentAction = "playToy";
    State.energy = clamp(State.energy - 8, 0, 100);
State.playfulness = clamp(State.playfulness + 18, 0, 100);
State.affection = clamp(State.affection + 3, 0, 100);

    setMood("Play Bow");
    setHint("Ball mode activated.");
    addBond(CONFIG.interaction.toyGain);
  },

  updateTreat(time, delta) {
    if (!this.treatActive) return;

    this.treatTimer -= delta;

    if (this.treatTimer > 1.2) {
      State.currentAction = "anticipateTreat";
      this.treat.position.y = 0.24 + Math.sin(time * 13) * 0.035;
      this.treat.rotation.x += delta * 1.6;
      this.treat.rotation.z += delta * 1.1;
    }

    if (this.treatTimer <= 1.2 && this.treatTimer > 0.35) {
      State.currentAction = "eatTreat";

      this.treat.position.x += (0.1 - this.treat.position.x) * 0.09;
      this.treat.position.y += (0.58 - this.treat.position.y) * 0.09;
      this.treat.position.z += (1.32 - this.treat.position.z) * 0.09;

      this.treat.rotation.x += delta * 4;
      this.treat.rotation.y += delta * 3;
    }

    if (this.treatTimer <= 0.35) {
      const s = clamp(this.treatTimer / 0.35, 0, 1);
      this.treat.scale.setScalar(s);
      State.currentAction = "eatTreat";
    }

    if (this.treatTimer <= 0) {
      this.treatActive = false;
      this.treat.visible = false;
      this.treat.scale.set(1, 1, 1);

      State.currentAction = "idle";
      setMood("Satisfied");
      setHint("Crunch. Very successful treat.");
    }
  },

  updateToy(time, delta) {
    if (!this.activeToy) return;

    this.toyExcitement = clamp(this.toyExcitement - delta * 0.08, 0, 1);

    this.ball.position.x += (this.ballTarget.x - this.ball.position.x) * 0.035;
    this.ball.position.z += (this.ballTarget.z - this.ball.position.z) * 0.035;

    const bounce = Math.abs(Math.sin(time * 7)) * 0.16 * this.toyExcitement;
    this.ball.position.y = 0.18 + bounce;

    this.ball.rotation.x += delta * 5;
    this.ball.rotation.z += delta * 7;

    if (Math.random() < delta * 0.45) {
      this.ballTarget.set(
        -1.05 + Math.random() * 2.1,
        0.22,
        0.65 + Math.random() * 0.9
      );
    }

    if (this.toyExcitement <= 0.05) {
      this.activeToy = false;
      State.currentAction = "idle";
      setMood("Pleased");
      setHint("She has settled after playing.");
    }
  },

  update(time, delta) {
    this.updateTreat(time, delta);
    this.updateToy(time, delta);
  }
};

ToySystem.create();

const raycaster = new THREE.Raycaster();
const pointerPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), -0.9);

const PettingSystem = {
  activeZone: null,
  petStreak: 0,
  affectionBurst: 0,
  leanAmount: 0,
  lastZone: null,
  lastPetTime: 0,
  hearts: [],

  zoneMessages: {
    head: "Head pats. Classic Raisin joy.",
    ear: "Ear scratches. She melts.",
    muzzle: "Tiny nose attention.",
    chest: "Chest fuss. Big contentment.",
    body: "Soft coat strokes."
  },

  identifyZone(objectName) {
    const name = objectName.toLowerCase();

    if (name.includes("ear")) return "ear";
    if (name.includes("muzzle") || name.includes("nose") || name.includes("chin")) return "muzzle";
    if (name.includes("chest")) return "chest";
    if (name.includes("head") || name.includes("crown") || name.includes("brow")) return "head";
    if (name.includes("body") || name.includes("ribcage") || name.includes("haunches")) return "body";

    return "body";
  },

  createHeart(position) {
    const heart = new THREE.Group();

    const mat = new THREE.MeshBasicMaterial({
      color: 0xffb5a7,
      transparent: true,
      opacity: 0.9
    });

    const left = new THREE.Mesh(new THREE.SphereGeometry(0.035, 12, 8), mat);
    const right = new THREE.Mesh(new THREE.SphereGeometry(0.035, 12, 8), mat);
    const point = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.09, 12), mat);

    left.position.set(-0.025, 0.025, 0);
    right.position.set(0.025, 0.025, 0);
    point.position.set(0, -0.025, 0);
    point.rotation.z = Math.PI;

    heart.add(left, right, point);
    heart.position.copy(position);
    heart.position.y += 0.18;
    heart.scale.setScalar(1);
    heart.userData.life = 1;
    heart.userData.floatSpeed = 0.35 + Math.random() * 0.25;
    heart.userData.drift = (Math.random() - 0.5) * 0.35;

    scene.add(heart);
    this.hearts.push(heart);
  },

  updateHearts(delta) {
    for (let i = this.hearts.length - 1; i >= 0; i--) {
      const heart = this.hearts[i];

      heart.userData.life -= delta * 0.9;
      heart.position.y += delta * heart.userData.floatSpeed;
      heart.position.x += delta * heart.userData.drift;
      heart.rotation.z += delta * 0.8;

      const scale = clamp(heart.userData.life, 0, 1);
      heart.scale.setScalar(0.6 + scale * 0.5);

      heart.children.forEach(part => {
        part.material.opacity = clamp(heart.userData.life, 0, 0.9);
      });

      if (heart.userData.life <= 0) {
        scene.remove(heart);
        this.hearts.splice(i, 1);
      }
    }
  },

  registerPet(hit) {
    const now = performance.now();
    if (now - this.lastPetTime < 110) return;

    const zone = this.identifyZone(hit.object.name);
    this.activeZone = zone;

    if (zone === this.lastZone) {
      this.petStreak += 1;
    } else {
      this.petStreak = 1;
    }

    this.lastZone = zone;
    this.lastPetTime = now;

    State.currentAction = "pet";
    State.affection = clamp(State.affection + 0.8, 0, 100);

    const gain = CONFIG.interaction.affectionGain + Math.min(this.petStreak * 0.025, 0.25);
    addBond(gain);

    this.affectionBurst = clamp(this.affectionBurst + 0.16, 0, 1);
    this.leanAmount = clamp(this.leanAmount + 0.12, 0, 1);

    if (this.petStreak % 6 === 0) {
      this.createHeart(hit.point);
      setMood("Best Friends");
      setHint("That is the spot.");
      addBond(1.2);
    } else {
      setMood(zone === "ear" ? "Melting" : "Happy");
      setHint(this.zoneMessages[zone] || "She likes that.");
    }
  },

  decay(delta) {
    this.affectionBurst += (0 - this.affectionBurst) * delta * 2.4;
    this.leanAmount += (0 - this.leanAmount) * delta * 1.7;

    if (!State.isPointerDown && State.currentAction === "pet") {
      const timeSincePet = performance.now() - this.lastPetTime;

      if (timeSincePet > 700) {
        State.currentAction = "idle";
        this.activeZone = null;
        this.petStreak = 0;
        setMood(State.bond > 55 ? "Content" : "Curious");
      }
    }
  }
};

function updatePointer(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  State.pointer.set(x, y);
  raycaster.setFromCamera(State.pointer, camera);
  raycaster.ray.intersectPlane(pointerPlane, State.pointerWorld);
}

function petRaisin() {
  raycaster.setFromCamera(State.pointer, camera);
  const hits = raycaster.intersectObjects(Raisin.gestureZones, true);

  if (hits.length > 0) {
    PettingSystem.registerPet(hits[0]);
  }
}

function onPointerDown(event) {
  State.isPointerDown = true;
  controls.enabled = false;
  updatePointer(event);
  petRaisin();
}

function onPointerMove(event) {
  updatePointer(event);
  if (State.isPointerDown) petRaisin();
}

function onPointerUp() {
  State.isPointerDown = false;
  controls.enabled = true;
}

renderer.domElement.addEventListener("pointerdown", onPointerDown);
renderer.domElement.addEventListener("pointermove", onPointerMove);
window.addEventListener("pointerup", onPointerUp);

    /************************************************************
 * 12. ANIMATION SYSTEM
 ************************************************************/

const LifeSystem = {
  blinkTimer: 0,
  nextBlink: 2.5,
  blinkAmount: 0,
  sniffTimer: 0,
  gazeTarget: new THREE.Vector3(0, 1.55, 2),
  headLook: new THREE.Vector2(0, 0),

  randomBetween(min, max) {
    return min + Math.random() * (max - min);
  },

  triggerBlink() {
    this.blinkTimer = 0.18;
    this.nextBlink = this.randomBetween(2.4, 6.5);
  },

  updateBlink(delta) {
    this.nextBlink -= delta;

    if (this.nextBlink <= 0 && this.blinkTimer <= 0) {
      this.triggerBlink();
    }

    if (this.blinkTimer > 0) {
      this.blinkTimer -= delta;
      const phase = 1 - Math.abs(this.blinkTimer / 0.18 - 0.5) * 2;
      this.blinkAmount = clamp(phase, 0, 1);
    } else {
      this.blinkAmount = 0;
    }
  },

  updateGaze(time) {
    const targetX = State.pointer.x * 0.18;
    const targetY = State.pointer.y * 0.12;

    this.headLook.x += (targetX - this.headLook.x) * 0.04;
    this.headLook.y += (targetY - this.headLook.y) * 0.04;

    if (State.currentAction === "call") {
      this.headLook.x += Math.sin(time * 2.2) * 0.004;
      this.headLook.y += Math.sin(time * 1.4) * 0.003;
    }
  },

  updateSniff(time, delta) {
    this.sniffTimer -= delta;

    if (this.sniffTimer <= 0) {
      this.sniffTimer = this.randomBetween(4, 9);
    }

    return this.sniffTimer < 0.6 ? Math.sin(time * 32) * 0.012 : 0;
  }
};

function animateRaisin(time, delta) {
  LifeSystem.updateBlink(delta);
  LifeSystem.updateGaze(time);
  const sniff = LifeSystem.updateSniff(time, delta);

  const breathing = Math.sin(time * 2.1) * 0.018;
  const softBob = Math.sin(time * 1.2) * 0.025;
  const microSway = Math.sin(time * 0.75) * 0.018;

  Raisin.root.rotation.z = microSway * 0.25;

  Raisin.body.scale.y = 0.5 + breathing;
  if (Raisin.ribcage) Raisin.ribcage.scale.y = 0.48 + breathing * 1.3;
  if (Raisin.haunches) Raisin.haunches.scale.y = 0.5 + breathing * 0.8;
  if (Raisin.chest) Raisin.chest.scale.y = 0.42 + breathing * 1.8;

  Raisin.head.position.y = 1.56 + softBob;
  Raisin.crown.position.y = 1.82 + softBob * 0.9;
  Raisin.muzzle.position.y = 1.42 + softBob * 0.75 + sniff;
  Raisin.nose.position.y = 1.48 + softBob * 0.75 + sniff;

  const headTilt =
    State.currentAction === "call" ? Math.sin(time * 2.4) * 0.24 :
    State.currentAction === "treat" ? 0.08 :
    State.currentAction === "toy" ? Math.sin(time * 4) * 0.13 :
    Math.sin(time * 0.9) * 0.045;

  Raisin.head.rotation.z = headTilt + LifeSystem.headLook.x;
  Raisin.crown.rotation.z = headTilt * 0.8 + LifeSystem.headLook.x;
  Raisin.muzzle.rotation.z = headTilt * 0.55 + LifeSystem.headLook.x * 0.5;

  Raisin.head.rotation.x = -LifeSystem.headLook.y * 0.45;
  Raisin.crown.rotation.x = -LifeSystem.headLook.y * 0.35;
  Raisin.muzzle.rotation.x = -LifeSystem.headLook.y * 0.25;

  const eyeOpen =
    State.currentAction === "nap" ? 0.25 :
    1 - LifeSystem.blinkAmount * 0.92;

  Raisin.leftEye.scale.y = 0.104 * eyeOpen;
  Raisin.rightEye.scale.y = 0.104 * eyeOpen;
  Raisin.leftPupil.scale.y = 0.042 * eyeOpen;
  Raisin.rightPupil.scale.y = 0.042 * eyeOpen;

  if (Raisin.leftEyeShine && Raisin.rightEyeShine) {
    Raisin.leftEyeShine.visible = eyeOpen > 0.35;
    Raisin.rightEyeShine.visible = eyeOpen > 0.35;
  }

  const pupilShiftX = LifeSystem.headLook.x * 0.08;
  const pupilShiftY = LifeSystem.headLook.y * 0.045;

  Raisin.leftPupil.position.x = -0.205 + pupilShiftX;
  Raisin.rightPupil.position.x = 0.205 + pupilShiftX;
  Raisin.leftPupil.position.y = 1.675 + pupilShiftY;
  Raisin.rightPupil.position.y = 1.675 + pupilShiftY;

  const baseTailSpeed =
    State.currentAction === "playToy" ? 13 :
    State.currentAction === "anticipateTreat" || State.currentAction === "eatTreat" ? 8 :
    State.currentAction === "pet" ? 11 :
    State.currentAction === "call" ? 7 :
    State.currentAction === "nap" ? 1 :
    4;

  const tailAmp =
    State.currentAction === "playToy" ? 0.62 :
    State.currentAction === "pet" ? 0.42 :
    State.currentAction === "call" ? 0.34 :
    State.currentAction === "nap" ? 0.05 :
    0.22;

  Raisin.tail.rotation.z = Math.sin(time * baseTailSpeed) * tailAmp;
  Raisin.tail.rotation.y = Math.cos(time * baseTailSpeed * 0.5) * tailAmp * 0.25;

  const earBase =
    State.currentAction === "playToy" ? Math.sin(time * 9) * 0.09 :
    State.currentAction === "call" ? Math.sin(time * 4) * 0.06 :
    State.currentAction === "pet" ? Math.sin(time * 6) * 0.04 :
    Math.sin(time * 1.7) * 0.018;

  Raisin.leftEar.rotation.z = -0.2 + earBase;
  Raisin.rightEar.rotation.z = 0.2 - earBase;
  Raisin.leftEar.rotation.x = -0.08 + Math.sin(time * 1.1) * 0.012;
  Raisin.rightEar.rotation.x = -0.08 + Math.cos(time * 1.1) * 0.012;

  if (State.currentAction === "anticipateTreat") {
  Raisin.head.position.z = 0.82 + 0.035;
  Raisin.muzzle.position.z = 1.16 + 0.05;
  Raisin.nose.position.z = 1.42 + 0.055;

  Raisin.head.rotation.x -= 0.05;
  Raisin.leftEye.scale.x = 0.087 * 1.08;
  Raisin.rightEye.scale.x = 0.087 * 1.08;
}

if (State.currentAction === "eatTreat") {
  Raisin.head.position.z = 0.82 + Math.sin(time * 9) * 0.025 + 0.055;
  Raisin.muzzle.position.z = 1.16 + Math.sin(time * 12) * 0.035 + 0.05;
  Raisin.nose.position.z = 1.42 + Math.sin(time * 12) * 0.035 + 0.05;

  Raisin.muzzle.position.y -= Math.abs(Math.sin(time * 12)) * 0.025;
  Raisin.nose.position.y -= Math.abs(Math.sin(time * 12)) * 0.025;
}

if (State.currentAction === "playToy") {
  Raisin.root.position.x = Math.sin(time * 3.2) * 0.045;
  Raisin.root.position.z = Math.cos(time * 2.5) * 0.035;

  Raisin.head.rotation.z += Math.sin(time * 5.5) * 0.1;
  Raisin.crown.rotation.z += Math.sin(time * 5.5) * 0.08;
  Raisin.muzzle.rotation.z += Math.sin(time * 5.5) * 0.06;
}

  if (State.currentAction === "pet") {
  const lean = PettingSystem.leanAmount || 0;
  const burst = PettingSystem.affectionBurst || 0;

  Raisin.head.position.y += Math.sin(time * 8) * 0.012;
  Raisin.head.position.z += 0.04 * lean;
  Raisin.crown.position.z += 0.035 * lean;
  Raisin.muzzle.position.y -= 0.018 + burst * 0.012;
  Raisin.muzzle.position.z += 0.045 * lean;
  Raisin.nose.position.z += 0.045 * lean;

  Raisin.root.position.y = 0.34 - 0.015;
  Raisin.root.rotation.x = -0.035 * lean;

  if (PettingSystem.activeZone === "ear") {
    Raisin.leftEar.rotation.x -= 0.045 * burst;
    Raisin.rightEar.rotation.x -= 0.045 * burst;
  }

  if (PettingSystem.activeZone === "chest") {
    Raisin.chest.scale.x = 0.38 + burst * 0.035;
    Raisin.chest.scale.y = 0.42 + burst * 0.035;
  }
} else if (State.currentAction === "nap") {
    Raisin.root.position.y += (0.26 - Raisin.root.position.y) * 0.035;
    Raisin.head.rotation.x += 0.12;
    Raisin.tail.rotation.z *= 0.4;
  } else {
    Raisin.root.position.y += (0.34 - Raisin.root.position.y) * 0.035;
  }
}

    /************************************************************
     * 13. DEBUG PANEL
     ************************************************************/

    function updateDebug() {
      const panel = document.getElementById("debugPanel");
      if (!State.debug) return;

      panel.innerHTML = `
        mood: ${State.mood}<br/>
        stage: ${State.bondStage}<br/>
        action: ${State.currentAction}<br/>
        bond: ${State.bond.toFixed(1)}<br/>
        trust: ${State.trust.toFixed(1)}<br/>
        affection: ${State.affection.toFixed(1)}<br/>
        comfort: ${State.comfort.toFixed(1)}<br/>
        play: ${State.playfulness.toFixed(1)}<br/>
        energy: ${State.energy.toFixed(1)}<br/>
        hunger: ${State.hunger.toFixed(1)}
`;
    }

    /************************************************************
     * 14. MAIN LOOP
     ************************************************************/

    function tick() {
      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();

      controls.update();
      animateRaisin(elapsed, delta);
PettingSystem.decay(delta);
PettingSystem.updateHearts(delta);
ToySystem.update(elapsed, delta);
MoodEngine.update(delta, elapsed);
updateDebug();


      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }

    tick();

    /************************************************************
     * 15. RESPONSIVE
     ************************************************************/

    function resize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    }

    window.addEventListener("resize", resize);

    /************************************************************
     * 16. STARTUP
     ************************************************************/

    document.getElementById("bondMeter").style.width = `${State.bond}%`;

const title = document.querySelector(".mood-title");
if (title) title.textContent = "Getting to know you";

setMood("Curious");
setHint("Touch and drag over Raisin to pet her.");

  crash.style.fontFamily = "monospace";
  crash.style.whiteSpace = "pre-wrap";
  crash.innerText =
    "RAISIN APP CRASH:\n\n" +
    (event.message || "Unknown error");

  document.body.appendChild(crash);

  console.error("Raisin app error:", event.error || event.message);
});
});
